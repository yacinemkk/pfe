# Configuration IoT Device Identification
# See docs/general, docs/train, docs/structure for specifications

paths:
  base_dir: "."
  data_dir: "data"
  raw_data_dir: "data/pcap/IPFIX ML Instances"
  processed_data_dir: "data/processed"
  results_dir: "results"
  models_dir: "results/models"

data:
  label_column: "name"
  sequence_length: 10
  stride: 5
  min_samples_per_class: 500
  
  sdn_excluded_columns:
    - start
    - srcMac
    - destMac
    - srcIP
    - destIP
    - srcPort
    - destPort
    - device
  
  features_to_keep:
    - duration
    - ipProto
    - outPacketCount
    - outByteCount
    - inPacketCount
    - inByteCount
    - outSmallPktCount
    - outLargePktCount
    - outNonEmptyPktCount
    - outDataByteCount
    - outAvgIAT
    - outFirstNonEmptyPktSize
    - outMaxPktSize
    - outStdevPayloadSize
    - outStdevIAT
    - outAvgPacketSize
    - inSmallPktCount
    - inLargePktCount
    - inNonEmptyPktCount
    - inDataByteCount
    - inAvgIAT
    - inFirstNonEmptyPktSize
    - inMaxPktSize
    - inStdevPayloadSize
    - inStdevIAT
    - inAvgPacketSize

  protocols_to_filter:
    - ARP
    - DHCP
    - ICMP
    - NTP

  iot_ipfix_home_classes:
    - Eclear
    - Sleep
    - Esensor
    - Hub Plus
    - Humidifier
    - Home Unit
    - Ink Jet Printer
    - Smart Wi-Fi Plug Mini
    - Smart Power Strip
    - Echo Dot
    - Fire 7 Tablet
    - Google Nest Mini
    - Google Chromecast
    - Atom Cam
    - Kasa Camera Pro
    - Kasa Smart LED Lamp
    - Fire TV Stick 4K
    - Qrio Hub

split:
  test_size: 0.2
  val_size: 0.1
  random_state: 42

training:
  batch_size: 64
  num_epochs: 30
  learning_rate: 0.001
  weight_decay: 0.0001
  early_stopping_patience: 5
  early_stopping_min_delta: 0.001

models:
  lstm:
    hidden_size: 64
    num_layers: 2
    bidirectional: true
    dropout: 0.3
    embedding_dim: 128
  
  bilstm:
    hidden_size: 64
    num_layers: 2
    dropout: 0.3
  
  cnn_lstm:
    lstm_hidden: 64
    lstm_layers: 1
    cnn_channels: 64
    cnn_kernel_size: 3
    pool_size: 2
    dense_units: 100
    dropout: 0.3
  
  xgboost_lstm:
    lstm_hidden: 64
    lstm_layers: 2
    bidirectional: true
    dropout: 0.3
    n_estimators: 200
    learning_rate: 0.1
    max_depth: 6
    min_child_weight: 3
    gamma: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
  
  transformer:
    d_model: 128
    nhead: 4
    num_encoder_layers: 6
    dim_feedforward: 512
    dropout: 0.2
    activation: "gelu"
    max_seq_length: 576
  
  hybrid:
    cnn_channels: 64
    cnn_kernel_small: 3
    cnn_kernel_large: 5
    cnn_pool_size: 2
    bilstm_hidden: 128
    bilstm_layers: 2
    bilstm_dropout: 0.3
    transformer_d_model: 256
    transformer_nhead: 4
    transformer_layers: 2
    transformer_ff_dim: 512
    transformer_dropout: 0.2
    fc_dropout: 0.4

tokenizer:
  vocab_size: 52000
  max_length: 576
  special_tokens:
    - "<s>"
    - "</s>"
    - "<pad>"
    - "<unk>"
    - "<mask>"

adversarial:
  feature_level:
    strategies:
      - Zero
      - Mimic_Mean
      - Mimic_95th
      - Padding_x10
  
  sequence_level:
    target_accuracy: 0.5
  
  combine_ratio: 0.5

mac_mapping:
  gateway: "38:d5:47:0c:25:d4"
  devices:
    "38:d5:47:0c:25:d4": "DEFAULT GATEWAY"
    "80:c5:f2:0b:aa:a9": "Qrio Hub"
    "00:17:88:47:20:f2": "Philips Hue Light Bulb"
    "e0:b9:4d:b9:eb:e9": "Planex Pan–Tilt Camera 1"
    "e0:b9:4d:5c:cf:c5": "JVC Kenwood Camera"
    "e0:b9:4d:5c:cf:c6": "Planex Pan–Tilt Camera 2"
    "d8:6c:63:47:54:dc": "Google Home"
    "d4:90:9c:da:0d:f0": "Apple HomePod"
    "04:5d:4b:a4:d0:2e": "Sony Bravia TV"
    "e0:09:bf:54:68:47": "Wansview Camera"
    "34:76:c5:7f:91:07": "Qwatch Camera"
    "20:32:33:86:f7:0f": "Fredi Camera"
    "00:22:cf:fd:c1:08": "Planex Outdoor Camera"
    "ec:f0:0e:55:25:39": "Powerlec Wi-Fi Plug"
    "a8:1e:84:e8:cc:c3": "LINE Clova Speaker"
